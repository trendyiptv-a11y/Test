<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Film</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { margin: 0 0 12px; }
    .player { position: relative; margin: 16px 0; }
    video { width: 100%; height: auto; background: #000; border-radius: 10px; }
    .bar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      margin: 10px 0 18px;
    }
    button, select, input, a.button {
      border: 1px solid #222; background: #fff; color: #111;
      padding: 10px 12px; border-radius: 10px; font-size: 14px;
      text-decoration: none;
      box-sizing: border-box;
    }
    input[type="url"] { flex: 1 1 320px; min-width: 240px; }
    button { cursor: pointer; }
    button:active { transform: translateY(1px); }
    #cap {
      position: absolute; left: 0; right: 0; bottom: 12%;
      padding: 10px 14px;
      text-align: center;
      background: rgba(0,0,0,.60);
      color: #fff;
      line-height: 1.35;
      pointer-events: none;
      white-space: pre-line;
      border-radius: 10px;
      margin: 0 10px;
      display: none;
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
    }
    .hint { color: #444; font-size: 13px; }
    #status { color: #444; font-size: 13px; min-height: 18px; margin: 8px 0 0; }
  </style>
</head>
<body>
  <h1>Film</h1>

  <div class="bar">
    <input id="urlInput" type="url" placeholder="Inserează URL MP4 / M3U8" />
    <button id="playUrl">Play URL</button>
    <button id="downloadBtn">Download</button>
  </div>

  <div class="bar">
    <button id="toggle">Subtitrări: ON</button>
    <button id="smaller">A-</button>
    <button id="bigger">A+</button>

    <label>
      Limbă:
      <select id="lang">
        <option value="ro" selected>Română</option>
        <option value="en">English</option>
      </select>
    </label>
  </div>

  <div id="status"></div>

  <div class="player">
    <video id="v" controls preload="metadata" playsinline crossorigin="anonymous">
      <source id="src" src="" type="video/mp4" />
      Browserul tău nu suportă redarea video.
    </video>
    <div id="cap"></div>
  </div>

  <p class="hint">
    Unele servere nu permit descărcare forțată din HTML local. În acest caz, butonul Download deschide direct fișierul video.
  </p>

  <script>
    const DEFAULT_VIDEO_URL = "http://yuniott.xyz:80/movie/CMP6HA3/WU7CDLU/1355553.mp4";
    const VTT = {
      ro: "/subtitles/avatar-en.vtt",
      en: "/subtitles/avatar-en.vtt"
    };

    const video = document.getElementById("v");
    const srcEl = document.getElementById("src");
    const cap = document.getElementById("cap");
    const statusEl = document.getElementById("status");
    const urlInput = document.getElementById("urlInput");
    const playUrlBtn = document.getElementById("playUrl");
    const downloadBtn = document.getElementById("downloadBtn");

    const toggleBtn = document.getElementById("toggle");
    const smallerBtn = document.getElementById("smaller");
    const biggerBtn = document.getElementById("bigger");
    const langSel = document.getElementById("lang");

    let currentVideoUrl = "";
    let cues = [];
    let enabled = true;
    let fontSize = 18;

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function normalizeUrl(value) {
      const url = (value || "").trim();
      if (!url) return "";
      return url;
    }

    function guessFileName(url) {
      try {
        const u = new URL(url, window.location.href);
        const last = u.pathname.split("/").filter(Boolean).pop() || "video.mp4";
        return last.includes(".") ? last : last + ".mp4";
      } catch {
        return "video.mp4";
      }
    }

    function setVideoUrl(url) {
      const cleanUrl = normalizeUrl(url);
      if (!cleanUrl) {
        setStatus("Introdu un URL valid.");
        return;
      }
      currentVideoUrl = cleanUrl;
      urlInput.value = cleanUrl;
      srcEl.src = cleanUrl;
      video.load();
      setStatus("URL încărcat.");
    }

    async function downloadCurrentVideo() {
      const url = normalizeUrl(currentVideoUrl || urlInput.value);
      if (!url) {
        setStatus("Nu există URL pentru download.");
        return;
      }

      setStatus("Se încearcă descărcarea...");

      try {
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = objectUrl;
        a.download = guessFileName(url);
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
        setStatus("Descărcarea a pornit.");
      } catch (err) {
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus("Serverul blochează download direct. Am deschis fișierul video direct.");
        console.error(err);
      }
    }

    function toSec(t) {
      const [hh, mm, ss] = t.split(":");
      return (+hh) * 3600 + (+mm) * 60 + parseFloat(ss);
    }

    function parseVTT(vtt) {
      const out = [];
      const blocks = vtt.replace(/\r/g, "").split("\n\n");
      for (const block of blocks) {
        const lines = block.split("\n").map(s => s.trim()).filter(Boolean);
        if (!lines.length) continue;
        if (lines[0] === "WEBVTT") continue;
        const timeLine = lines.find(l => l.includes("-->"));
        if (!timeLine) continue;
        const [a, rest] = timeLine.split("-->");
        const start = toSec(a.trim());
        const end = toSec(rest.trim().split(" ")[0]);
        const textLines = lines.filter(l => l !== timeLine && !/^\d+$/.test(l));
        out.push({ start, end, text: textLines.join("\n") });
      }
      out.sort((x, y) => x.start - y.start);
      return out;
    }

    async function loadSubtitles(lang) {
      const url = VTT[lang] || VTT.ro;
      const r = await fetch(url, { cache: "no-store" });
      if (!r.ok) throw new Error("Nu pot încărca VTT: " + url + " (" + r.status + ")");
      const text = await r.text();
      if (!text.startsWith("WEBVTT")) throw new Error("Fișierul nu pare WebVTT: " + url);
      cues = parseVTT(text);
    }

    function setCaptionVisible(on) {
      enabled = on;
      toggleBtn.textContent = "Subtitrări: " + (enabled ? "ON" : "OFF");
      cap.style.display = enabled ? "block" : "none";
      if (!enabled) cap.textContent = "";
    }

    function setFontSize(px) {
      fontSize = Math.max(12, Math.min(34, px));
      cap.style.fontSize = fontSize + "px";
    }

    function render() {
      if (enabled && cues.length) {
        const t = video.currentTime;
        const cue = cues.find(c => t >= c.start && t <= c.end);
        cap.textContent = cue ? cue.text : "";
      }
      requestAnimationFrame(render);
    }

    playUrlBtn.addEventListener("click", () => setVideoUrl(urlInput.value));
    downloadBtn.addEventListener("click", downloadCurrentVideo);
    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") setVideoUrl(urlInput.value);
    });

    toggleBtn.addEventListener("click", () => setCaptionVisible(!enabled));
    smallerBtn.addEventListener("click", () => setFontSize(fontSize - 2));
    biggerBtn.addEventListener("click", () => setFontSize(fontSize + 2));

    langSel.addEventListener("change", async () => {
      try {
        cap.textContent = "Se încarcă subtitrarea…";
        await loadSubtitles(langSel.value);
        if (enabled) cap.textContent = "";
      } catch (e) {
        cap.textContent = "Subtitrare indisponibilă.";
        console.error(e);
      }
    });

    (async () => {
      setFontSize(fontSize);
      setCaptionVisible(true);
      setVideoUrl(DEFAULT_VIDEO_URL);
      try {
        await loadSubtitles(langSel.value);
      } catch (e) {
        try {
          langSel.value = "en";
          await loadSubtitles("en");
        } catch (_) {
          setCaptionVisible(false);
        }
        console.error(e);
      }
      render();
    })();
  </script>
</body>
</html>
