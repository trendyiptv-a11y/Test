<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Film cu Video.js</title>

  <!-- CSS Video.js -->
  <link href="https://vjs.zencdn.net/8.14.1/video-js.css" rel="stylesheet">

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; }
  </style>
</head>
<body>

  <h1>Film</h1>

  <video
    id="my-video"
    class="video-js vjs-default-skin"
    controls
    preload="auto"
    width="100%"
    data-setup='{}'
  >
    <source
      src="http://yuniott.xyz:80/movie/CMP6HA3/WU7CDLU/1355553.mp4"
      type="video/mp4"
    />

    <track
      kind="captions"
      src="/subtitles/avatar-en.vtt"
      srclang="en"
      label="English"
      default
    />
  </video>

  <!-- JS Video.js -->
  <script src="https://vjs.zencdn.net/8.14.1/video.min.js"></script>
  <script>
    const player = videojs('my-video');

    // optional: afișează în consolă track-urile
    player.on('loadedmetadata', () => {
      console.log(player.textTracks());
    });
  </script>

</body>
</html>
