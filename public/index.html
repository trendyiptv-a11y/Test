<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Film</title>

  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.14.1/video-js.css" rel="stylesheet" />

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .video-js {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>

<h1>Film</h1>

<video
  id="player"
  class="video-js vjs-default-skin"
  controls
  preload="metadata"
  playsinline
  crossorigin="anonymous"
  data-setup='{
    "fluid": true,
    "controlBar": {
      "pictureInPictureToggle": false
    }
  }'
>
  <source
    src="http://yuniott.xyz:80/movie/CMP6HA3/WU7CDLU/1355553.mp4"
    type="video/mp4"
  />

  <track
    kind="captions"
    src="/subtitles/avatar-en.vtt"
    srclang="ro"
    label="Română"
    default
  />
</video>

<!-- Video.js JS -->
<script src="https://vjs.zencdn.net/8.14.1/video.min.js"></script>

<script>
  const player = videojs('player');

  // forțăm subtitrarea ON (chiar dacă CC nu apare)
  player.ready(() => {
    const tracks = player.textTracks();
    if (tracks.length) {
      tracks[0].mode = 'showing';
    }
  });
</script>

</body>
</html>
